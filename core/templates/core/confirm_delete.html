{% extends 'core/base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center p-5">
                <div style="width:64px;height:64px;background:#FEE2E2;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
                    <i class="bi bi-trash3" style="font-size:24px;color:#DC2626;"></i>
                </div>
                <h4 style="font-weight:700;margin-bottom:8px;">{{ title }}</h4>
                <p class="text-muted mb-4">
                    <strong>{{ obj }}</strong> ni o'chirishni tasdiqlaysizmi?<br>
                    <small>Bu amalni qaytarib bo'lmaydi.</small>
                </p>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Bekor qilish</a>
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash3 me-1"></i>O'chirish
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
